<!DOCTYPE html>
<html lang="zh-CN" class="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>💌 匿名表白墙 · Anonymous Confession Wall</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #ffe6f0 0%, #ffe0f7 30%, #fde8ff 70%, #ffe4e9 100%);
            font-family: 'Segoe UI', 'Inter', 'PingFang SC', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem;
            position: relative;
        }

        body::before {
            content: "❤️💕💗💖💘💝";
            position: fixed;
            top: 10%;
            left: 5%;
            font-size: 2.5rem;
            opacity: 0.12;
            white-space: pre-wrap;
            pointer-events: none;
            transform: rotate(-5deg);
            z-index: 0;
        }

        .language-switch {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            z-index: 10;
            display: flex;
            gap: 0.5rem;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #f8bbd0;
            padding: 0.4rem 0.9rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 650;
            cursor: pointer;
            color: #ad1457;
            transition: all 0.2s;
            backdrop-filter: blur(5px);
        }

        .lang-btn.active {
            background: #e91e63;
            color: white;
            border-color: #e91e63;
            box-shadow: 0 4px 10px rgba(233, 30, 99, 0.3);
        }

        .lang-btn:hover:not(.active) {
            background: white;
            border-color: #e91e63;
        }

        .container {
            max-width: 750px;
            width: 100%;
            background: rgba(255, 245, 250, 0.8);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 3rem;
            padding: 2.2rem 1.8rem;
            box-shadow: 0 30px 50px rgba(233, 30, 99, 0.2), 0 10px 25px rgba(0,0,0,0.08);
            border: 1px solid rgba(255, 255, 255, 0.85);
            position: relative;
            z-index: 2;
        }

        h1 {
            text-align: center;
            font-size: 2.3rem;
            font-weight: 700;
            color: #c2185b;
            margin-bottom: 0.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            letter-spacing: 1px;
            flex-wrap: wrap;
        }

        .sub-header {
            text-align: center;
            color: #d44a7a;
            margin-bottom: 2.2rem;
            font-weight: 500;
            font-size: 0.95rem;
            border-bottom: 2px dashed #f8bbd0;
            padding-bottom: 1.2rem;
        }

        .tabs {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 2rem;
            background: rgba(255, 255, 255, 0.5);
            padding: 0.4rem;
            border-radius: 60px;
            backdrop-filter: blur(10px);
        }

        .tab-btn {
            flex: 1;
            padding: 0.8rem 1rem;
            border: none;
            background: transparent;
            border-radius: 50px;
            font-weight: 650;
            font-size: 1rem;
            color: #ad1457;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #e91e63, #c2185b);
            color: white;
            box-shadow: 0 10px 20px rgba(233, 30, 99, 0.4);
        }

        .panel {
            display: none;
            animation: fade 0.3s ease;
        }

        .panel.active {
            display: block;
        }

        @keyframes fade {
            from { opacity: 0.5; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.6rem;
            border: 1px solid #fce4ec;
            box-shadow: 0 10px 18px rgba(0,0,0,0.03);
        }

        .input-group {
            margin-bottom: 1.3rem;
        }

        label {
            font-weight: 650;
            color: #880e4f;
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }

        input, textarea {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border-radius: 30px;
            border: 1px solid #f8bbd0;
            background: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
            font-family: inherit;
        }

        textarea {
            border-radius: 25px;
            resize: vertical;
            min-height: 90px;
        }

        input:focus, textarea:focus {
            border-color: #e91e63;
            box-shadow: 0 0 0 4px rgba(233, 30, 99, 0.15);
        }

        .btn {
            background: linear-gradient(135deg, #e91e63, #ad1457);
            border: none;
            color: white;
            padding: 0.9rem 2rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: 0.25s;
            box-shadow: 0 12px 20px -10px rgba(233, 30, 99, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: linear-gradient(135deg, #d81b60, #880e4f);
            transform: scale(1.02);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: white;
            color: #c2185b;
            border: 2px solid #f8bbd0;
            box-shadow: none;
            margin-top: 0.8rem;
        }

        .btn-secondary:hover {
            background: #fce4ec;
        }

        .messages-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1.2rem;
            max-height: 450px;
            overflow-y: auto;
            padding-right: 0.3rem;
        }

        .message-bubble {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 1.8rem;
            padding: 1.2rem 1.4rem;
            border: 1px solid #ffdae5;
            box-shadow: 0 8px 14px rgba(233, 30, 99, 0.08);
            transition: 0.2s;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            color: #ad1457;
            font-weight: 650;
            flex-wrap: wrap;
            gap: 0.3rem;
        }

        .to-name {
            background: #fce4ec;
            padding: 0.25rem 0.9rem;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #880e4f;
        }

        .message-text {
            font-size: 1rem;
            color: #4a2542;
            margin: 0.6rem 0 0.4rem;
            font-style: italic;
            line-height: 1.5;
        }

        .message-time {
            font-size: 0.7rem;
            color: #b0809a;
            text-align: right;
        }

        .empty-state {
            text-align: center;
            padding: 2.5rem;
            color: #b34e6e;
            background: rgba(255,255,240,0.6);
            border-radius: 2rem;
        }

        .search-highlight {
            background: #f8bbd0;
            border-radius: 4px;
            padding: 0 4px;
        }

        .loading-spinner {
            text-align: center;
            padding: 1rem;
            color: #c2185b;
        }

        .error-message {
            background: #fff0f0;
            color: #c2185b;
            padding: 0.8rem;
            border-radius: 1rem;
            text-align: center;
            font-size: 0.85rem;
            margin: 0.5rem 0;
        }

        /* 多语言支持：默认显示中文，英文类隐藏 */
        .zh .lang-zh { display: inline; }
        .zh .lang-en { display: none; }
        .en .lang-zh { display: none; }
        .en .lang-en { display: inline; }

        /* 对于块级元素，使用 block */
        .zh .lang-zh.block, .en .lang-en.block { display: block; }

        @media (max-width: 500px) {
            .container {
                padding: 1.8rem 1.2rem;
            }
            .language-switch {
                top: 0.5rem;
                right: 0.8rem;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 语言切换按钮 -->
    <div class="language-switch">
        <button class="lang-btn active" id="langZhBtn">中文</button>
        <button class="lang-btn" id="langEnBtn">EN</button>
    </div>

    <h1>
        <i class="fas fa-heart" style="color: #e91e63;"></i> 
        <span class="lang-zh">匿名表白墙</span>
        <span class="lang-en">Anonymous Confession Wall</span>
    </h1>
    <div class="sub-header">
        <i class="fas fa-globe"></i> 
        <span class="lang-zh">全网共享 · 搜索你的名字发现惊喜</span>
        <span class="lang-en">Shared globally · Search your name for a surprise</span>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tabWriteBtn">
            <i class="fas fa-pen-fancy"></i> 
            <span class="lang-zh">写表白</span>
            <span class="lang-en">Write</span>
        </button>
        <button class="tab-btn" id="tabSearchBtn">
            <i class="fas fa-search"></i> 
            <span class="lang-zh">搜表白</span>
            <span class="lang-en">Search</span>
        </button>
    </div>

    <!-- 写表白面板 -->
    <div class="panel active" id="writePanel">
        <div class="message-card">
            <div class="input-group">
                <label>
                    <i class="fas fa-user-heart"></i> 
                    <span class="lang-zh">表白对象（对方的名字/昵称）</span>
                    <span class="lang-en">Crush's name / nickname</span>
                </label>
                <input type="text" id="toNameInput" placeholder="小明 / John..." maxlength="30">
            </div>
            <div class="input-group">
                <label>
                    <i class="fas fa-quote-right"></i> 
                    <span class="lang-zh">你的心里话</span>
                    <span class="lang-en">Your message</span>
                </label>
                <textarea id="messageInput" placeholder="写下你想说的话... / Write something..." maxlength="200"></textarea>
            </div>
            <button class="btn" id="submitBtn">
                <i class="fas fa-paper-plane"></i> 
                <span class="lang-zh">匿名发送表白</span>
                <span class="lang-en">Send Anonymously</span>
            </button>
            <p style="font-size:0.75rem; color:#b34e6e; margin-top:0.8rem; text-align:center;">
                <i class="fas fa-shield-alt"></i> 
                <span class="lang-zh">完全匿名 · 所有人都能看到</span>
                <span class="lang-en">100% Anonymous · Visible to everyone</span>
            </p>
        </div>

        <div style="margin-top: 1.8rem;">
            <h3 style="color:#ad1457; margin-bottom:0.8rem;">
                <i class="fas fa-clock"></i> 
                <span class="lang-zh">最新匿名表白</span>
                <span class="lang-en">Latest Confessions</span>
            </h3>
            <div class="messages-list" id="recentMessages">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-pulse"></i> 
                    <span class="lang-zh">加载中...</span>
                    <span class="lang-en">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 搜表白面板 -->
    <div class="panel" id="searchPanel">
        <div class="message-card">
            <div class="input-group">
                <label>
                    <i class="fas fa-search"></i> 
                    <span class="lang-zh">输入你的名字或昵称</span>
                    <span class="lang-en">Enter your name or nickname</span>
                </label>
                <input type="text" id="searchNameInput" placeholder="你的名字 / Your name...">
            </div>
            <button class="btn" id="searchBtn">
                <i class="fas fa-heart"></i> 
                <span class="lang-zh">查找表白</span>
                <span class="lang-en">Search Confessions</span>
            </button>
            <button class="btn btn-secondary" id="clearSearchBtn">
                <i class="fas fa-times"></i> 
                <span class="lang-zh">清除结果</span>
                <span class="lang-en">Clear Results</span>
            </button>
        </div>
        <div style="margin-top: 1.5rem;">
            <h3 style="color:#ad1457; margin-bottom:0.8rem;" id="searchResultTitle">
                <i class="fas fa-inbox"></i> 
                <span class="lang-zh">搜索结果</span>
                <span class="lang-en">Search Results</span>
            </h3>
            <div class="messages-list" id="searchResults">
                <div class="empty-state">
                    <i class="fas fa-search" style="font-size:2rem; opacity:0.5;"></i>
                    <p>
                        <span class="lang-zh">输入名字后点击查找</span>
                        <span class="lang-en">Enter a name and click search</span>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ==================== Supabase 配置 ====================
        const SUPABASE_URL = 'https://drkzfmjnheybdhwhwssr.supabase.co'
        const SUPABASE_ANON_KEY = 'sb_publishable_PT_ZFr1sbaMvh9_rgWDLoA_s5DR2GTF'
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

        // ==================== 语言管理 ====================
        let currentLang = 'zh'; // 默认中文

        function switchLanguage(lang) {
            currentLang = lang;
            const htmlElement = document.documentElement;
            htmlElement.classList.remove('zh', 'en');
            htmlElement.classList.add(lang);
            
            // 更新语言按钮状态
            document.getElementById('langZhBtn').classList.toggle('active', lang === 'zh');
            document.getElementById('langEnBtn').classList.toggle('active', lang === 'en');

            // 更新输入框占位符
            updatePlaceholders();
            
            // 刷新当前面板的文本
            refreshCurrentPanel();
        }

        function updatePlaceholders() {
            const toNameInput = document.getElementById('toNameInput');
            const messageInput = document.getElementById('messageInput');
            const searchNameInput = document.getElementById('searchNameInput');
            
            if (currentLang === 'zh') {
                toNameInput.placeholder = '例如：小明、图书馆靠窗的女孩...';
                messageInput.placeholder = '写下你想说的话... 完全匿名发布';
                searchNameInput.placeholder = '看看有没有人偷偷向你表白...';
            } else {
                toNameInput.placeholder = 'e.g. John, the girl in the library...';
                messageInput.placeholder = 'Write your message... 100% anonymous';
                searchNameInput.placeholder = 'See if someone secretly likes you...';
            }
        }

        function refreshCurrentPanel() {
            const writePanel = document.getElementById('writePanel');
            const searchPanel = document.getElementById('searchPanel');
            
            if (writePanel.classList.contains('active')) {
                refreshRecent();
            }
            // 搜索面板保持之前的结果不变
        }

        // ==================== 数据操作 ====================
        async function saveMessage(toName, messageText) {
            const { data, error } = await supabase
                .from('love_messages')
                .insert([{ to_name: toName.trim(), message: messageText.trim() }])
                .select()
            
            if (error) throw error
            return data
        }

        async function getRecentMessages(limit = 20) {
            const { data, error } = await supabase
                .from('love_messages')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(limit)
            
            if (error) throw error
            return data
        }

        async function searchMessages(name) {
            if (!name.trim()) return []
            
            const { data, error } = await supabase
                .from('love_messages')
                .select('*')
                .ilike('to_name', `%${name.trim()}%`)
                .order('created_at', { ascending: false })
                .limit(50)
            
            if (error) throw error
            return data
        }

        // ==================== UI 渲染 ====================
        const recentContainer = document.getElementById('recentMessages');
        const searchResultsContainer = document.getElementById('searchResults');
        const searchResultTitle = document.getElementById('searchResultTitle');

        function formatTime(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            
            if (currentLang === 'zh') {
                if (diff < 60000) return '刚刚';
                if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
                if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
                return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
            } else {
                if (diff < 60000) return 'Just now';
                if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
                if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            }
        }

        function getUITexts() {
            if (currentLang === 'zh') {
                return {
                    to: '致：',
                    anonymous: '匿名',
                    noMessages: '还没有表白呢～ 去写一条吧',
                    loadFailed: '加载失败，请检查网络连接或刷新页面',
                    searchFailed: '搜索失败，请稍后重试',
                    searchPrompt: '输入名字后点击查找',
                    foundResults: (count, name) => `找到 ${count} 条关于"${name}"的表白`,
                    searchResults: '搜索结果',
                    sending: '发送中...',
                    sendSuccess: '💌 表白已匿名发送！所有人都能看到啦～',
                    sendFailed: '发送失败，请检查网络后重试',
                    sendButton: '匿名发送表白',
                    emptyNameError: '请输入表白对象的名字哦～',
                    emptyMessageError: '写点什么吧，哪怕一句简单的"我喜欢你"💕',
                    emptySearchError: '请输入要搜索的名字',
                };
            } else {
                return {
                    to: 'To: ',
                    anonymous: 'Anonymous',
                    noMessages: 'No confessions yet ~ Write one!',
                    loadFailed: 'Failed to load. Check connection or refresh.',
                    searchFailed: 'Search failed. Try again later.',
                    searchPrompt: 'Enter a name and click search',
                    foundResults: (count, name) => `Found ${count} confession(s) for "${name}"`,
                    searchResults: 'Search Results',
                    sending: 'Sending...',
                    sendSuccess: '💌 Confession sent anonymously! Everyone can see it now~',
                    sendFailed: 'Send failed. Check connection and retry.',
                    sendButton: 'Send Anonymously',
                    emptyNameError: 'Please enter the name of your crush~',
                    emptyMessageError: 'Write something, even a simple "I like you" 💕',
                    emptySearchError: 'Please enter a name to search',
                };
            }
        }

        function renderMessageList(container, msgArray, highlightName = '') {
            if (!container) return;
            const texts = getUITexts();
            
            if (!msgArray || msgArray.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="far fa-heart" style="font-size:2rem; opacity:0.5;"></i><p>${texts.noMessages}</p></div>`;
                return;
            }

            let html = '';
            msgArray.forEach(msg => {
                const toName = msg.to_name || '';
                const message = msg.message || '';
                const createdAt = msg.created_at || new Date().toISOString();

                let displayToName = toName;
                if (highlightName) {
                    const escaped = highlightName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    const regex = new RegExp(`(${escaped})`, 'gi');
                    displayToName = toName.replace(regex, '<span class="search-highlight">$1</span>');
                }

                html += `
                    <div class="message-bubble">
                        <div class="message-header">
                            <span><i class="fas fa-heart" style="color:#e91e63; margin-right:4px;"></i> ${texts.to}<span class="to-name">${displayToName}</span></span>
                            <span style="font-size:0.7rem; color:#b0809a;">${texts.anonymous}</span>
                        </div>
                        <div class="message-text">"${message.replace(/</g, '&lt;').replace(/>/g, '&gt;')}"</div>
                        <div class="message-time">🕒 ${formatTime(createdAt)}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        async function refreshRecent() {
            try {
                const texts = getUITexts();
                recentContainer.innerHTML = `<div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i> ${currentLang === 'zh' ? '加载中...' : 'Loading...'}</div>`;
                const messages = await getRecentMessages(20);
                renderMessageList(recentContainer, messages);
            } catch (error) {
                console.error('加载失败:', error);
                const texts = getUITexts();
                recentContainer.innerHTML = `<div class="error-message">${texts.loadFailed}</div>`;
            }
        }

        async function performSearch(name) {
            try {
                const texts = getUITexts();
                searchResultsContainer.innerHTML = `<div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i> ${currentLang === 'zh' ? '搜索中...' : 'Searching...'}</div>`;
                const results = await searchMessages(name);
                searchResultTitle.innerHTML = `<i class="fas fa-inbox"></i> ${texts.foundResults(results.length, name)}`;
                renderMessageList(searchResultsContainer, results, name);
            } catch (error) {
                console.error('搜索失败:', error);
                const texts = getUITexts();
                searchResultsContainer.innerHTML = `<div class="error-message">${texts.searchFailed}</div>`;
            }
        }

        // ==================== 事件绑定 ====================
        const langZhBtn = document.getElementById('langZhBtn');
        const langEnBtn = document.getElementById('langEnBtn');
        
        const tabWriteBtn = document.getElementById('tabWriteBtn');
        const tabSearchBtn = document.getElementById('tabSearchBtn');
        const writePanel = document.getElementById('writePanel');
        const searchPanel = document.getElementById('searchPanel');

        const toNameInput = document.getElementById('toNameInput');
        const messageInput = document.getElementById('messageInput');
        const submitBtn = document.getElementById('submitBtn');

        const searchNameInput = document.getElementById('searchNameInput');
        const searchBtn = document.getElementById('searchBtn');
        const clearSearchBtn = document.getElementById('clearSearchBtn');

        // 语言切换
        langZhBtn.addEventListener('click', () => switchLanguage('zh'));
        langEnBtn.addEventListener('click', () => switchLanguage('en'));

        // 选项卡切换
        tabWriteBtn.addEventListener('click', () => {
            tabWriteBtn.classList.add('active');
            tabSearchBtn.classList.remove('active');
            writePanel.classList.add('active');
            searchPanel.classList.remove('active');
            refreshRecent();
        });

        tabSearchBtn.addEventListener('click', () => {
            tabSearchBtn.classList.add('active');
            tabWriteBtn.classList.remove('active');
            searchPanel.classList.add('active');
            writePanel.classList.remove('active');
        });

        // 提交表白
        submitBtn.addEventListener('click', async () => {
            const texts = getUITexts();
            const toName = toNameInput.value.trim();
            const message = messageInput.value.trim();

            if (!toName) {
                alert(texts.emptyNameError);
                return;
            }
            if (!message) {
                alert(texts.emptyMessageError);
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> ${texts.sending}`;

            try {
                await saveMessage(toName, message);
                toNameInput.value = '';
                messageInput.value = '';
                alert(texts.sendSuccess);
                await refreshRecent();
            } catch (error) {
                console.error('发送失败:', error);
                alert(texts.sendFailed);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="fas fa-paper-plane"></i> ${texts.sendButton}`;
            }
        });

        // 搜索表白
        searchBtn.addEventListener('click', () => {
            const texts = getUITexts();
            const name = searchNameInput.value.trim();
            if (!name) {
                alert(texts.emptySearchError);
                return;
            }
            performSearch(name);
        });

        // 清除搜索结果
        clearSearchBtn.addEventListener('click', () => {
            const texts = getUITexts();
            searchNameInput.value = '';
            searchResultsContainer.innerHTML = `<div class="empty-state"><i class="fas fa-search" style="font-size:2rem; opacity:0.5;"></i><p>${texts.searchPrompt}</p></div>`;
            searchResultTitle.innerHTML = `<i class="fas fa-inbox"></i> ${texts.searchResults}`;
        });

        searchNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchBtn.click();
            }
        });

        // 初始化
        updatePlaceholders();
        refreshRecent();
    })();
</script>
</body>
</html>
